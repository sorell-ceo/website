<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sorell | Vibe Check</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet" />
    
    <link rel="stylesheet" href="quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;700;800&family=Inter:wght@400;700;500&display=swap" rel="stylesheet">
</head>
<body class="locked">

    <div class="quiz-bg-container"></div>

    <div id="quiz-page">
        
        <div class="quiz-hero-title">
            <h1>FIND MY<br>COLLEGE TEST</h1>
        </div>
        
        <div id="question-stack-container">
            <div id="question-stack">
                </div>
        </div>

        <div id="swipe-instructions">
            <span class="material-symbols-outlined">chevron_left</span>
            Swipe
            <span class="material-symbols-outlined">chevron_right</span>
        </div>

        <div id="final-container" class="hidden">
            <button id="view-aura-btn" class="final-cta">View my College Aura</button>
            
            <div id="lead-form-overlay">
                <div class="lead-form-content">
                    <h2 class="form-title">STREAK SECURED</h2>
                    <p class="form-subtitle">Enter details to reveal your Campus Match</p>
                    <form id="lead-form" onsubmit="handleFormSubmit(event)">
                        <input type="text" id="user-name" name="user_name" placeholder="Name" required>
                        <input type="tel" id="user-phone" name="user_phone" placeholder="Phone Number" required>
                        <button type="submit" id="get-aura-btn">GET MY AURA</button>
                    </form>
                </div>
            </div>
        </div>

    </div>

    <script src="quiz.js"></script>
</body>
</html>
