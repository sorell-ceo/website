<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sorell | Vibe Check</title>
    <link rel="stylesheet" href="quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Google+Sans:wght@400;500;700&family=Space+Grotesk:wght@400;700&display=swap" rel="stylesheet">
    <!-- GSAP CDN -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
</head>
<body>
    <div id="quiz-page">

        <nav class="glass-nav">
            <div class="nav-logo">Sorell.</div>
            <div class="nav-tag">Vibe Check</div>
        </nav>

        <!-- Big heading -->
        <h1 class="quiz-heading">Find My College Test</h1>

        <div id="question-stack-container">
            <div id="question-stack"></div>
        </div>

        <!-- Swipe instructions with animated icons -->
        <div id="swipe-instructions">
            <span class="swipe-icon swipe-icon-left">&#8592;</span>
            <span class="swipe-label">Swipe to answer</span>
            <span class="swipe-icon swipe-icon-right">&#8594;</span>
        </div>

        <div id="final-container" class="hidden">
            <button id="view-aura-btn" class="final-cta">View my College Aura</button>

            <div id="lead-form-overlay">
                <div class="lead-form-content">
                    <h2 class="form-title">STREAK SECURED</h2>
                    <p class="form-subtitle">Enter details to reveal your Campus Match</p>
                    <form id="lead-form" onsubmit="handleFormSubmit(event)">
                        <input type="text" id="user-name"  name="user_name"  placeholder="Name"         required>
                        <input type="tel"  id="user-phone" name="user_phone" placeholder="Phone number" required>
                        <button type="submit" id="get-aura-btn">GET MY AURA</button>
                    </form>
                </div>
            </div>
        </div>

    </div>

    <script src="quiz.js"></script>
</body>
</html>
