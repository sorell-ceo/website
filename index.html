<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive 3D Globe - Earth Edition</title>
    <style>
        /* Reset and layout */
        body { margin: 0; padding: 0; background-color: #000; overflow: hidden; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; color: white; }
        #globeViz { width: 100vw; height: 100vh; cursor: grab; }
        #globeViz:active { cursor: grabbing; }

        /* Search Bar UI */
        .search-container {
            position: absolute;
            top: 30px;
            left: 30px;
            z-index: 10;
            background: rgba(10, 15, 10, 0.85);
            padding: 20px;
            border-radius: 12px;
            border: 1px solid #33ffaa;
            box-shadow: 0 8px 32px rgba(51, 255, 170, 0.15);
            backdrop-filter: blur(10px);
        }
        input {
            padding: 12px 15px;
            width: 280px;
            border-radius: 6px;
            border: 1px solid #333;
            background: #111;
            color: #fff;
            font-size: 16px;
            outline: none;
            transition: all 0.3s ease;
        }
        input:focus { border-color: #33ffaa; box-shadow: 0 0 10px rgba(51, 255, 170, 0.3); }
        
        /* Tooltip UI */
        .tooltip {
            background: rgba(10, 15, 10, 0.95);
            padding: 15px;
            border-radius: 8px;
            border-left: 4px solid #33ffaa;
            pointer-events: none;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            font-size: 14px;
            line-height: 1.5;
        }
        .tooltip-title { font-size: 20px; color: #33ffaa; font-weight: bold; margin-bottom: 5px; text-transform: uppercase; letter-spacing: 1px; }
        .highlight { color: #fff; font-weight: 600; }
    </style>
    
    <script src="https://unpkg.com/three"></script>
    <script src="https://unpkg.com/globe.gl"></script>
</head>
<body>
    <div class="search-container">
        <input type="text" id="countrySearch" placeholder="Search for a country..." autocomplete="off">
        <div id="searchResult" style="margin-top: 10px; font-size: 13px; color: #ff4444;"></div>
    </div>

    <div id="globeViz"></div>

    <script>
        // 1. Define the Oceans for our labeling system
        const oceans = [
            { name: 'Pacific Ocean', lat: 0, lng: -160 },
            { name: 'Atlantic Ocean', lat: 0, lng: -30 },
            { name: 'Indian Ocean', lat: -20, lng: 80 },
            { name: 'Arctic Ocean', lat: 80, lng: 0 },
            { name: 'Southern Ocean', lat: -60, lng: 0 }
        ];

        // 2. Configure the Three.js Material for the Water
        // We use MeshPhongMaterial to give the ocean a glossy, reflective shine
        const waterMaterial = new THREE.MeshPhongMaterial({ 
            color: '#02386e', // Deep oceanic blue
            transparent: true,
            opacity: 0.9,
            shininess: 40
        });

        // 3. Initialize the High-Fidelity Globe
        const world = Globe()
            (document.getElementById('globeViz'))
            .backgroundColor('#000000') // Pitch black space
            .showAtmosphere(true)
            .atmosphereColor('#33aaff') // Soft blue atmospheric glow
            .atmosphereAltitude(0.15)
            .globeMaterial(waterMaterial) // Inject the water texture
            .polygonAltitude(0.015)
            // Color grading: Land is Green, borders are bright
            .polygonCapColor(() => '#1b5e20') // Deep forest green for landmasses
            .polygonSideColor(() => '#0a2e0e') // Darker green for the extruded sides
            .polygonStrokeColor(() => '#81c784') // Vibrant green outlines for continents
            // Build the data-driven tooltip
            .polygonLabel(({ properties: d, restData: r }) => `
                <div class="tooltip">
                    <div class="tooltip-title">${d.ADMIN}</div>
                    <div><span class="highlight">Capital:</span> ${r?.capital ? r.capital[0] : 'Data Unavailable'}</div>
                    <div><span class="highlight">Area:</span> ${r?.area ? r.area.toLocaleString() + ' km²' : 'Data Unavailable'}</div>
                </div>
            `)
            // Interactive hover effect (pops the country out and turns it bright neon green)
            .onPolygonHover(hoverD => world
                .polygonAltitude(d => d === hoverD ? 0.08 : 0.015)
                .polygonCapColor(d => d === hoverD ? '#4caf50' : '#1b5e20')
            )
            // Map the oceans as 3D text labels floating above the water
            .labelsData(oceans)
            .labelLat(d => d.lat)
            .labelLng(d => d.lng)
            .labelText(d => d.name)
            .labelSize(3.5)
            .labelDotRadius(0.5)
            .labelColor(() => 'rgba(255, 255, 255, 0.8)')
            .labelResolution(2);

        // Add a subtle auto-rotation to make it feel alive
        world.controls().autoRotate = true;
        world.controls().autoRotateSpeed = 0.5;

        // Pause rotation when the user interacts
        document.getElementById('globeViz').addEventListener('mousedown', () => {
            world.controls().autoRotate = false;
        });

        let geoJsonData = [];

        // 4. The Data Engine: Fetch shapefiles and demographic data simultaneously
        Promise.all([
            fetch('https://raw.githubusercontent.com/vasturiano/globe.gl/master/example/datasets/ne_110m_admin_0_countries.geojson').then(res => res.json()),
            fetch('https://restcountries.com/v3.1/all').then(res => res.json())
        ]).then(([countries, restData]) => {
            
            // Index the REST data by ISO code for O(1) lookup speeds
            const restMap = {};
            restData.forEach(c => { restMap[c.cca3] = c; });

            // Merge the data sets and calculate rough centroids for the camera to target
            countries.features.forEach(feat => {
                feat.restData = restMap[feat.properties.ISO_A3] || restMap[feat.properties.ADM0_A3] || {};
                
                if(feat.geometry) {
                    let lats = [], lngs = [];
                    const coords = feat.geometry.type === 'Polygon' ? [feat.geometry.coordinates] : feat.geometry.coordinates;
                    coords.forEach(poly => poly[0].forEach(coord => {
                        lngs.push(coord[0]); lats.push(coord[1]);
                    }));
                    feat.centerLat = (Math.min(...lats) + Math.max(...lats)) / 2;
                    feat.centerLng = (Math.min(...lngs) + Math.max(...lngs)) / 2;
                }
            });

            geoJsonData = countries.features;
            world.polygonsData(geoJsonData);
        });

        // 5. Build the Search Logic
        const searchInput = document.getElementById('countrySearch');
        const resultDiv = document.getElementById('searchResult');

        searchInput.addEventListener('input', (e) => {
            const query = e.target.value.toLowerCase().trim();
            resultDiv.innerText = '';
            
            if (!query) return;

            // Find the closest matching country
            const match = geoJsonData.find(d => 
                d.properties.ADMIN.toLowerCase().startsWith(query) || 
                d.properties.ADMIN.toLowerCase() === query
            );
            
            if (match && match.centerLat !== undefined) {
                // Fly the camera directly to the target
                world.pointOfView({ lat: match.centerLat, lng: match.centerLng, altitude: 1.5 }, 1200);
                world.controls().autoRotate = false; // Stop rotation so user can view it
            } else if (query.length > 2) {
                resultDiv.innerText = 'Country not found.';
            }
        });

        // 6. Keep it responsive
        window.addEventListener('resize', () => {
            world.width(window.innerWidth);
            world.height(window.innerHeight);
        });
    </script>
</body>
</html>
