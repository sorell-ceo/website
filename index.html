<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Interactive Globe</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#000008;overflow:hidden;width:100vw;height:100vh;font-family:'Segoe UI',system-ui,sans-serif}
canvas{display:block}
#label-layer{position:fixed;inset:0;pointer-events:none;overflow:hidden;z-index:5}
.clbl{
  position:absolute;
  color:rgba(160,210,255,0.9);
  font-size:10px;font-weight:600;
  letter-spacing:0.06em;text-transform:uppercase;
  text-shadow:0 0 5px #000,0 0 10px #000820;
  white-space:nowrap;pointer-events:auto;cursor:pointer;
  transform:translate(-50%,-50%);
  transition:color 0.2s,text-shadow 0.2s;
  user-select:none;
}
.clbl:hover{color:#fff;text-shadow:0 0 6px #4af,0 0 14px #08f}
.clbl.hi{color:#fff;font-size:12px;text-shadow:0 0 8px #4af,0 0 16px #08f}
.olbl{
  position:absolute;
  color:rgba(30,110,220,0.5);
  font-size:13px;font-weight:700;
  letter-spacing:0.2em;text-transform:uppercase;
  font-style:italic;
  text-shadow:0 0 8px #000820;
  white-space:nowrap;pointer-events:none;
  transform:translate(-50%,-50%);
  user-select:none;
}
#sw{position:fixed;top:20px;left:50%;transform:translateX(-50%);z-index:50;width:300px}
#si{
  width:100%;padding:10px 16px;
  background:rgba(4,12,35,0.88);
  border:1px solid rgba(60,140,255,0.35);
  border-radius:24px;color:#c8e0ff;font-size:14px;
  outline:none;backdrop-filter:blur(8px);
  transition:border-color .2s,box-shadow .2s;
}
#si::placeholder{color:rgba(100,160,255,0.4)}
#si:focus{border-color:rgba(80,180,255,0.65);box-shadow:0 0 0 3px rgba(60,140,255,0.13)}
#sr{
  margin-top:6px;background:rgba(3,10,30,0.96);
  border:1px solid rgba(60,140,255,0.22);border-radius:12px;
  display:none;overflow-y:auto;max-height:260px;backdrop-filter:blur(10px);
}
#sr::-webkit-scrollbar{width:4px}
#sr::-webkit-scrollbar-thumb{background:rgba(60,140,255,0.3);border-radius:4px}
.ri{
  padding:9px 16px;cursor:pointer;color:#9dc8ef;font-size:13px;
  border-bottom:1px solid rgba(60,140,255,0.08);
  display:flex;justify-content:space-between;align-items:center;
  transition:background .15s;
}
.ri:last-child{border-bottom:none}
.ri:hover{background:rgba(60,140,255,0.15);color:#fff}
.ri .cap{color:rgba(100,160,255,0.5);font-size:11px}
#panel{
  position:fixed;bottom:28px;left:28px;width:230px;
  background:rgba(3,10,30,0.92);
  border:1px solid rgba(60,140,255,0.28);border-radius:14px;
  padding:16px 18px;backdrop-filter:blur(12px);
  transform:translateY(16px);opacity:0;
  transition:opacity .3s,transform .3s;pointer-events:none;z-index:50;
}
#panel.on{opacity:1;transform:translateY(0);pointer-events:auto}
#panel h2{color:#e8f4ff;font-size:15px;font-weight:600;margin-bottom:12px;line-height:1.3}
.pr{display:flex;justify-content:space-between;margin-bottom:7px;gap:8px}
.pr .lb{color:rgba(100,160,255,0.55);font-size:11px;text-transform:uppercase;letter-spacing:.07em;padding-top:1px;flex-shrink:0}
.pr .vl{color:#b8d8f8;font-size:12px;font-weight:500;text-align:right}
#pc{position:absolute;top:10px;right:12px;background:none;border:none;color:rgba(100,160,255,0.5);cursor:pointer;font-size:18px;line-height:1;padding:2px}
#pc:hover{color:#fff}
#loading{
  position:fixed;inset:0;display:flex;flex-direction:column;gap:14px;
  align-items:center;justify-content:center;
  color:rgba(80,140,255,0.8);font-size:13px;letter-spacing:.1em;
  background:#000008;z-index:300;transition:opacity .6s;
}
#lb{width:200px;height:2px;background:rgba(60,140,255,0.15);border-radius:2px;overflow:hidden}
#lf{height:100%;width:0%;background:#3a8fff;border-radius:2px;transition:width .3s}
#hint{
  position:fixed;bottom:24px;right:24px;
  color:rgba(50,110,190,0.4);font-size:12px;letter-spacing:.03em;
  pointer-events:none;transition:opacity 1s;z-index:10;
}
</style>
</head>
<body>
<div id="loading"><div>LOADING GLOBE</div><div id="lb"><div id="lf"></div></div></div>
<div id="label-layer"></div>

<div id="sw">
  <input id="si" type="text" placeholder="Search country or capital..." autocomplete="off" spellcheck="false">
  <div id="sr"></div>
</div>

<div id="panel">
  <button id="pc">×</button>
  <h2 id="pn"></h2>
  <div class="pr"><span class="lb">Capital</span><span class="vl" id="pcap"></span></div>
  <div class="pr"><span class="lb">Area</span><span class="vl" id="parea"></span></div>
  <div class="pr"><span class="lb">Region</span><span class="vl" id="preg"></span></div>
</div>

<div id="hint">drag · scroll to zoom · click a country</div>

const W=window.innerWidth, H=window.innerHeight;
const renderer=new THREE.WebGLRenderer({antialias:true});
renderer.setPixelRatio(Math.min(devicePixelRatio,2));
renderer.setSize(W,H);
renderer.setClearColor(0x000008);
document.body.appendChild(renderer.domElement);

const scene=new THREE.Scene();
const camera=new THREE.PerspectiveCamera(45,W/H,0.1,100);
camera.position.z=2.6;

/* Stars */
const sv=[];
for(let i=0;i<8000;i++){
  const t=2*Math.PI*Math.random(),p=Math.acos(2*Math.random()-1),r=40+Math.random()*20;
  sv.push(r*Math.sin(p)*Math.cos(t),r*Math.cos(p),r*Math.sin(p)*Math.sin(t));
}
const sg=new THREE.BufferGeometry();
sg.setAttribute('position',new THREE.Float32BufferAttribute(sv,3));
scene.add(new THREE.Points(sg,new THREE.PointsMaterial({color:0xaaccff,size:0.06,sizeAttenuation:true})));

/* Globe */
const RADIUS=1;
const globe=new THREE.Mesh(
  new THREE.SphereGeometry(RADIUS,64,64),
  new THREE.MeshPhongMaterial({color:0x020c1f,emissive:0x050d25,shininess:18})
);

/* Atmosphere */
scene.add(new THREE.Mesh(
  new THREE.SphereGeometry(RADIUS*1.025,64,64),
  new THREE.MeshPhongMaterial({color:0x1155cc,emissive:0x0833aa,side:THREE.FrontSide,transparent:true,opacity:0.08,depthWrite:false})
));

/* Lights */
scene.add(new THREE.AmbientLight(0x112244,1.2));
const sun=new THREE.DirectionalLight(0x99bbff,1.8); sun.position.set(4,3,5); scene.add(sun);
scene.add(Object.assign(new THREE.DirectionalLight(0x112266,0.4),{position:new THREE.Vector3(-3,-1,-2)}));

/* Pivot */
const pivot=new THREE.Group();
scene.add(pivot);
pivot.add(globe);

/* ── Helpers ── */
function ll2v(lat,lon,r){
  const phi=(90-lat)*(Math.PI/180), theta=(lon+180)*(Math.PI/180);
  return new THREE.Vector3(
    -r*Math.sin(phi)*Math.cos(theta),
     r*Math.cos(phi),
     r*Math.sin(phi)*Math.sin(theta)
  );
}

function projectScreen(wp){
  const v=wp.clone().project(camera);
  return{
    x:(v.x*.5+.5)*window.innerWidth,
    y:(-(v.y*.5)+.5)*window.innerHeight,
    behind:v.z>1
  };
}

/* ── Labels DOM ── */
const layer=document.getElementById('label-layer');
const camDir=new THREE.Vector3();

const cLabels=CD.map(c=>{
  const el=document.createElement('div');
  el.className='clbl';
  el.textContent=c.n;
  layer.appendChild(el);
  el.addEventListener('click',()=>showPanel(c));
  return{el,wp:ll2v(c.lat,c.lon,RADIUS*1.005),c};
});

const oLabels=OD.map(o=>{
  const el=document.createElement('div');
  el.className='olbl';
  el.textContent=o.n;
  layer.appendChild(el);
  return{el,wp:ll2v(o.lat,o.lon,RADIUS*1.005)};
});

function updateLabels(){
  camera.getWorldDirection(camDir);
  const zoom=camera.position.z;
  const showC=zoom<4.0;

  cLabels.forEach(({el,wp,c})=>{
    const rot=wp.clone().applyEuler(pivot.rotation);
    const dot=rot.dot(camDir);
    if(dot>-0.1||!showC){el.style.display='none';return;}
    const s=projectScreen(rot);
    if(s.behind){el.style.display='none';return;}
    el.style.display='block';
    el.style.left=s.x+'px';
    el.style.top=s.y+'px';
    const fade=Math.min(1,(4.0-zoom)/1.5);
    el.style.opacity=String(fade);
    const sc=Math.max(0.75,Math.min(1.3,2.6/zoom));
    el.style.fontSize=(10*sc).toFixed(1)+'px';
  });

  oLabels.forEach(({el,wp})=>{
    const rot=wp.clone().applyEuler(pivot.rotation);
    const dot=rot.dot(camDir);
    if(dot>-0.06){el.style.display='none';return;}
    const s=projectScreen(rot);
    if(s.behind){el.style.display='none';return;}
    el.style.display='block';
    el.style.left=s.x+'px';
    el.style.top=s.y+'px';
    el.style.opacity=String(Math.min(1,(-dot-.06)*4));
  });
}

/* ── Panel ── */
function showPanel(c){
  document.getElementById('pn').textContent=c.n;
  document.getElementById('pcap').textContent=c.cap;
  document.getElementById('parea').textContent=c.area.toLocaleString()+' km²';
  document.getElementById('preg').textContent=c.reg;
  document.getElementById('panel').classList.add('on');
}
document.getElementById('pc').addEventListener('click',()=>document.getElementById('panel').classList.remove('on'));

/* ── Fly-to ── */
let flyTarget=null;
function flyTo(c){
  flyTarget={
    rotX:-(c.lat*Math.PI/180),
    rotY:-(c.lon*Math.PI/180)-Math.PI
  };
  targetCamZ=2.0;
  showPanel(c);
  cLabels.forEach(l=>l.el.classList.remove('hi'));
  const found=cLabels.find(l=>l.c===c);
  if(found) found.el.classList.add('hi');
}

/* ── Search ── */
const si=document.getElementById('si');
const sr=document.getElementById('sr');

si.addEventListener('input',()=>{
  const q=si.value.trim().toLowerCase();
  sr.style.display='none'; sr.innerHTML='';
  if(!q) return;
  const matches=CD.filter(c=>c.n.toLowerCase().includes(q)||c.cap.toLowerCase().includes(q)).slice(0,8);
  if(!matches.length) return;
  matches.forEach(c=>{
    const d=document.createElement('div');
    d.className='ri';
    d.innerHTML=`<span>${c.n}</span><span class="cap">${c.cap}</span>`;
    d.addEventListener('click',()=>{
      flyTo(c); si.value=c.n; sr.style.display='none'; lastInteract=Date.now();
    });
    sr.appendChild(d);
  });
  sr.style.display='block';
});

document.addEventListener('click',e=>{
  if(!document.getElementById('sw').contains(e.target)) sr.style.display='none';
});
si.addEventListener('keydown',e=>{
  if(e.key==='Escape'){sr.style.display='none';si.blur();}
  if(e.key==='Enter'){
    const q=si.value.trim().toLowerCase();
    const m=CD.find(c=>c.n.toLowerCase().startsWith(q)||c.cap.toLowerCase().startsWith(q));
    if(m){flyTo(m);si.value=m.n;sr.style.display='none';lastInteract=Date.now();}
  }
});

/* ── Outlines ── */
const R_LINE=RADIUS*1.002;
const oMat=new THREE.LineBasicMaterial({color:0x3a8fff,transparent:true,opacity:0.75});

function ringLine(coords,r){
  return new THREE.Line(
    new THREE.BufferGeometry().setFromPoints(coords.map(([lo,la])=>ll2v(la,lo,r))),
    oMat
  );
}
function addPoly(rings,r){for(const ring of rings) if(ring.length>1) pivot.add(ringLine(ring,r));}

function toGeoJson(topo){
  const sc=topo.transform.scale, tr=topo.transform.translate;
  const arcs=topo.arcs.map(a=>{
    let x=0,y=0;
    return a.map(([dx,dy])=>{x+=dx;y+=dy;return[x*sc[0]+tr[0],y*sc[1]+tr[1]];});
  });
  const sArc=i=>i<0?arcs[~i].slice().reverse():arcs[i].slice();
  const sRing=ids=>{
    const pts=[];
    for(const i of ids){const s=sArc(i);pts.push(...(pts.length?s.slice(1):s));}
    if(pts.length) pts.push(pts[0]); return pts;
  };
  return topo.objects.countries.geometries.map(g=>{
    if(g.type==='Polygon') return{type:'Feature',geometry:{type:'Polygon',coordinates:g.arcs.map(sRing)}};
    if(g.type==='MultiPolygon') return{type:'Feature',geometry:{type:'MultiPolygon',coordinates:g.arcs.map(p=>p.map(sRing))}};
    return null;
  }).filter(Boolean);
}

setProgress(20);
fetch('https://cdn.jsdelivr.net/npm/world-atlas@2/countries-110m.json')
  .then(r=>r.json())
  .then(topo=>{setProgress(60);return toGeoJson(topo);})
  .then(features=>{
    features.forEach(f=>{
      const g=f.geometry; if(!g) return;
      if(g.type==='Polygon') addPoly(g.coordinates,R_LINE);
      else if(g.type==='MultiPolygon') g.coordinates.forEach(p=>addPoly(p,R_LINE));
    });
    setProgress(100);
    setTimeout(()=>{
      const ld=document.getElementById('loading');
      ld.style.opacity='0';
      setTimeout(()=>ld.remove(),600);
    },300);
  })
  .catch(()=>{document.getElementById('loading').textContent='Failed to load country data';});

function setProgress(p){document.getElementById('lf').style.width=p+'%';}

/* ── Controls ── */
let isDrag=false,lx=0,ly=0;
let rotX=0.3,rotY=0,tRotX=0.3,tRotY=0;
let camZ=2.6,targetCamZ=2.6;
let lastInteract=Date.now();
const IDLE=3000;

const cvs=renderer.domElement;
cvs.addEventListener('mousedown',e=>{isDrag=true;lx=e.clientX;ly=e.clientY;flyTarget=null;lastInteract=Date.now();});
window.addEventListener('mousemove',e=>{
  if(!isDrag) return;
  tRotY+=(e.clientX-lx)*0.005; tRotX+=(e.clientY-ly)*0.005;
  tRotX=Math.max(-Math.PI/2,Math.min(Math.PI/2,tRotX));
  lx=e.clientX;ly=e.clientY;
});
window.addEventListener('mouseup',()=>isDrag=false);

cvs.addEventListener('wheel',e=>{
  e.preventDefault();
  targetCamZ=Math.max(1.3,Math.min(5,targetCamZ+e.deltaY*0.003));
  lastInteract=Date.now();flyTarget=null;
},{passive:false});

let t0=null,td0=null;
cvs.addEventListener('touchstart',e=>{
  flyTarget=null;lastInteract=Date.now();
  if(e.touches.length===1){isDrag=true;lx=e.touches[0].clientX;ly=e.touches[0].clientY;}
  else if(e.touches.length===2){
    isDrag=false;
    td0=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);
    t0=targetCamZ;
  }
},{passive:true});
cvs.addEventListener('touchmove',e=>{
  e.preventDefault();
  if(e.touches.length===1&&isDrag){
    tRotY+=(e.touches[0].clientX-lx)*0.006; tRotX+=(e.touches[0].clientY-ly)*0.006;
    tRotX=Math.max(-Math.PI/2,Math.min(Math.PI/2,tRotX));
    lx=e.touches[0].clientX;ly=e.touches[0].clientY;
  } else if(e.touches.length===2&&td0!==null){
    const d=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);
    targetCamZ=Math.max(1.3,Math.min(5,t0*(td0/d)));
  }
},{passive:false});
cvs.addEventListener('touchend',()=>{isDrag=false;td0=null;});

window.addEventListener('resize',()=>{
  const w=window.innerWidth,h=window.innerHeight;
  camera.aspect=w/h; camera.updateProjectionMatrix();
  renderer.setSize(w,h);
});

setTimeout(()=>document.getElementById('hint').style.opacity='0',5000);

/* ── Render loop ── */
const clock=new THREE.Clock();
function animate(){
  requestAnimationFrame(animate);
  const dt=clock.getDelta();

  if(flyTarget){
    tRotX+=(flyTarget.rotX-tRotX)*0.1;
    tRotY+=(flyTarget.rotY-tRotY)*0.1;
    if(Math.abs(flyTarget.rotX-tRotX)<0.001&&Math.abs(flyTarget.rotY-tRotY)<0.001) flyTarget=null;
  } else if(Date.now()-lastInteract>IDLE){
    tRotY+=0.1*dt;
  }

  rotX+=(tRotX-rotX)*0.08;
  rotY+=(tRotY-rotY)*0.08;
  camZ+=(targetCamZ-camZ)*0.08;

  pivot.rotation.x=rotX;
  pivot.rotation.y=rotY;
  camera.position.z=camZ;

  renderer.render(scene,camera);
  updateLabels();
}
animate();
</script>
