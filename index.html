<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Sorell | College Match</title>
  <link rel="stylesheet" href="styles.css">
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@700&family=Inter:wght@400;700&display=swap" rel="stylesheet">
</head>
<body class="locked">

  <div id="scratch-stage">
    <div class="scratch-card">
      <div class="scratch-content">
        <h2 class="aura-text">AURA DETECTED</h2>
        <p>Your college destiny is processing...</p>
        <button id="reveal-site-btn">ENTER SORELL</button>
      </div>
      
      <canvas id="scratch-canvas"></canvas>
      
      <div id="scratch-text-overlay">SCRATCH TO REVEAL</div>
      
    </div>
  </div>

  <div id="main-site" class="hidden">
    
    <nav class="glass-nav">
      <div class="nav-logo trigger-quiz">Sorell.</div>
      <div class="nav-tag trigger-quiz">Find my Match</div>
    </nav>

    <div class="cta-container">
      <button class="primary-cta trigger-quiz">START VIBE CHECK</button>
    </div>

  </div>

  <script src="script.js"></script>
</body>
</html>
