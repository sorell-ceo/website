<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --blue-deep: #020c1b;
    --blue-mid: #0a1628;
    --blue-glow: #1a4a8a;
    --blue-bright: #2a7de1;
    --blue-accent: #4db8ff;
    --blue-land: #1a3a6e;
    --blue-land-hover: #2a5aaa;
    --cyan: #00d4ff;
    --white: #e8f4ff;
    --dim: rgba(232,244,255,0.5);
    --panel-bg: rgba(2,12,27,0.88);
  }

  html, body {
    width: 100%; height: 100%; overflow: hidden;
    background: var(--blue-deep);
    font-family: 'Space Mono', monospace;
    color: var(--white);
  }

  #canvas-container {
    position: fixed; inset: 0;
  }

  canvas { display: block; }

  /* ── Stars bg ── */
  #stars {
    position: fixed; inset: 0; pointer-events: none; z-index: 0;
  }

  /* ── Header ── */
  #header {
    position: fixed; top: 0; left: 0; right: 0;
    display: flex; align-items: center; justify-content: space-between;
    padding: 18px 28px;
    z-index: 10;
    border-bottom: 1px solid rgba(77,184,255,0.12);
    background: linear-gradient(to bottom, rgba(2,12,27,0.95), transparent);
  }

  #logo {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 1.5rem;
    letter-spacing: 0.18em;
    color: var(--cyan);
    text-shadow: 0 0 20px rgba(0,212,255,0.4);
  }

  #logo span {
    color: rgba(0,212,255,0.35);
    font-size: 0.65rem;
    display: block;
    letter-spacing: 0.3em;
    margin-top: 1px;
  }

  #controls-hint {
    font-size: 0.6rem;
    color: var(--dim);
    letter-spacing: 0.1em;
    text-align: right;
    line-height: 1.8;
  }

  /* ── Search ── */
  #search-wrap {
    position: fixed;
    top: 80px; left: 28px;
    z-index: 10;
    width: 270px;
  }

  #search-input {
    width: 100%;
    background: var(--panel-bg);
    border: 1px solid rgba(77,184,255,0.25);
    border-radius: 4px;
    padding: 10px 14px;
    font-family: 'Space Mono', monospace;
    font-size: 0.72rem;
    color: var(--white);
    letter-spacing: 0.05em;
    outline: none;
    transition: border-color 0.2s;
  }

  #search-input::placeholder { color: var(--dim); }
  #search-input:focus { border-color: var(--cyan); box-shadow: 0 0 12px rgba(0,212,255,0.15); }

  #search-results {
    margin-top: 4px;
    background: var(--panel-bg);
    border: 1px solid rgba(77,184,255,0.2);
    border-radius: 4px;
    max-height: 220px;
    overflow-y: auto;
    display: none;
  }

  #search-results::-webkit-scrollbar { width: 4px; }
  #search-results::-webkit-scrollbar-track { background: transparent; }
  #search-results::-webkit-scrollbar-thumb { background: var(--blue-glow); border-radius: 2px; }

  .search-item {
    padding: 9px 14px;
    font-size: 0.68rem;
    cursor: pointer;
    letter-spacing: 0.04em;
    border-bottom: 1px solid rgba(77,184,255,0.08);
    transition: background 0.15s;
  }

  .search-item:hover { background: rgba(42,126,225,0.2); color: var(--cyan); }
  .search-item:last-child { border-bottom: none; }

  /* ── Info panel ── */
  #info-panel {
    position: fixed;
    bottom: 30px; right: 28px;
    width: 280px;
    background: var(--panel-bg);
    border: 1px solid rgba(77,184,255,0.2);
    border-radius: 6px;
    padding: 20px;
    z-index: 10;
    display: none;
    backdrop-filter: blur(10px);
  }

  #info-panel.visible { display: block; animation: slideUp 0.25s ease; }

  @keyframes slideUp {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }

  #info-close {
    position: absolute; top: 12px; right: 14px;
    background: none; border: none; color: var(--dim);
    font-size: 1rem; cursor: pointer; line-height: 1;
    transition: color 0.15s;
  }
  #info-close:hover { color: var(--cyan); }

  #info-country {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 1.05rem;
    color: var(--cyan);
    letter-spacing: 0.06em;
    margin-bottom: 14px;
    padding-right: 20px;
  }

  .info-row {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 10px;
    font-size: 0.64rem;
    line-height: 1.5;
  }

  .info-label {
    color: var(--dim);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    white-space: nowrap;
    margin-right: 12px;
    padding-top: 1px;
  }

  .info-value {
    text-align: right;
    color: var(--white);
    font-size: 0.72rem;
  }

  /* ── Legend ── */
  #legend {
    position: fixed;
    bottom: 30px; left: 28px;
    font-size: 0.58rem;
    color: var(--dim);
    letter-spacing: 0.08em;
    z-index: 10;
    line-height: 2;
  }

  #legend div::before {
    content: '─ ';
    color: var(--blue-bright);
  }

  /* ── Tooltip for hover ── */
  #tooltip {
    position: fixed;
    background: rgba(2,12,27,0.92);
    border: 1px solid rgba(77,184,255,0.3);
    border-radius: 3px;
    padding: 5px 10px;
    font-size: 0.62rem;
    letter-spacing: 0.06em;
    pointer-events: none;
    z-index: 20;
    display: none;
    color: var(--cyan);
  }

  /* ── Loading ── */
  #loading {
    position: fixed; inset: 0;
    background: var(--blue-deep);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 100;
  }

  #loading-logo {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 2rem;
    letter-spacing: 0.25em;
    color: var(--cyan);
    text-shadow: 0 0 40px rgba(0,212,255,0.5);
    margin-bottom: 30px;
  }

  #loading-bar-wrap {
    width: 200px;
    height: 2px;
    background: rgba(77,184,255,0.15);
    border-radius: 1px;
    overflow: hidden;
  }

  #loading-bar {
    height: 100%;
    background: var(--cyan);
    width: 0%;
    transition: width 0.3s ease;
    box-shadow: 0 0 8px var(--cyan);
  }

  #loading-text {
    margin-top: 14px;
    font-size: 0.58rem;
    letter-spacing: 0.15em;
    color: var(--dim);
  }
</style>
</head>
<body>

<canvas id="stars"></canvas>
<div id="canvas-container"><canvas id="globe-canvas"></canvas></div>

<div id="loading">
  <div id="loading-logo">TERRA</div>
  <div id="loading-bar-wrap"><div id="loading-bar"></div></div>
  <div id="loading-text">INITIALIZING GLOBE...</div>
</div>

<div id="header">
  <div id="logo">TERRA <span>INTERACTIVE GLOBE</span></div>
  <div id="controls-hint">
    DRAG — ROTATE &nbsp;|&nbsp; SCROLL — ZOOM<br>
    CLICK COUNTRY — VIEW INFO &nbsp;|&nbsp; SEARCH — FIND
  </div>
</div>

<div id="search-wrap">
  <input id="search-input" type="text" placeholder="SEARCH COUNTRY..." autocomplete="off" spellcheck="false">
  <div id="search-results"></div>
</div>

<div id="info-panel">
  <button id="info-close">✕</button>
  <div id="info-country">—</div>
  <div class="info-row">
    <span class="info-label">CAPITAL</span>
    <span class="info-value" id="info-capital">—</span>
  </div>
  <div class="info-row">
    <span class="info-label">AREA</span>
    <span class="info-value" id="info-area">—</span>
  </div>
  <div class="info-row">
    <span class="info-label">POPULATION</span>
    <span class="info-value" id="info-pop">—</span>
  </div>
  <div class="info-row">
    <span class="info-label">REGION</span>
    <span class="info-value" id="info-region">—</span>
  </div>
</div>

<div id="legend">
  <div>CONTINENTS OUTLINED</div>
  <div>OCEAN LABELS VISIBLE</div>
  <div>COUNTRY DATA EMBEDDED</div>
</div>

<div id="tooltip"></div>

function drawStars() {
  const canvas = document.getElementById('stars');
  const ctx = canvas.getContext('2d');
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
  ctx.fillStyle = '#020c1b';
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  for (let i = 0; i < 800; i++) {
    const x = Math.random() * canvas.width;
    const y = Math.random() * canvas.height;
    const r = Math.random() * 1.2;
    const alpha = Math.random() * 0.8 + 0.2;
    ctx.beginPath();
    ctx.arc(x, y, r, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(200,220,255,${alpha})`;
    ctx.fill();
  }
}

function createGlobe() {
  // Ocean sphere
  const geo = new THREE.SphereGeometry(RADIUS, 64, 64);
  const mat = new THREE.MeshPhongMaterial({
    color: 0x061830,
    emissive: 0x020810,
    specular: 0x1a4a8a,
    shininess: 60,
  });
  globeMesh = new THREE.Mesh(geo, mat);
  scene.add(globeMesh);

  // Atmosphere glow
  const atmGeo = new THREE.SphereGeometry(RADIUS * 1.04, 48, 48);
  const atmMat = new THREE.MeshPhongMaterial({
    color: 0x1a4aaa,
    transparent: true,
    opacity: 0.07,
    side: THREE.FrontSide,
  });
  atmosphereMesh = new THREE.Mesh(atmGeo, atmMat);
  scene.add(atmosphereMesh);

  // Outer glow ring
  const glowGeo = new THREE.SphereGeometry(RADIUS * 1.08, 32, 32);
  const glowMat = new THREE.MeshPhongMaterial({
    color: 0x0a2a6a,
    transparent: true,
    opacity: 0.03,
    side: THREE.BackSide,
  });
  scene.add(new THREE.Mesh(glowGeo, glowMat));

  // Graticule lines (latitude/longitude grid)
  const gratGroup = new THREE.Group();
  const gratMat = new THREE.LineBasicMaterial({ color: 0x0a2050, transparent: true, opacity: 0.4 });
  for (let lat = -80; lat <= 80; lat += 20) {
    const pts = [];
    for (let lon = 0; lon <= 360; lon += 3) {
      pts.push(latLonToVec3(lat, lon, RADIUS * 1.001));
    }
    gratGroup.add(new THREE.Line(new THREE.BufferGeometry().setFromPoints(pts), gratMat));
  }
  for (let lon = 0; lon < 360; lon += 20) {
    const pts = [];
    for (let lat = -90; lat <= 90; lat += 3) {
      pts.push(latLonToVec3(lat, lon, RADIUS * 1.001));
    }
    gratGroup.add(new THREE.Line(new THREE.BufferGeometry().setFromPoints(pts), gratMat));
  }
  scene.add(gratGroup);
}

function latLonToVec3(lat, lon, r) {
  const phi = (90 - lat) * (Math.PI / 180);
  const theta = (lon + 180) * (Math.PI / 180);
  return new THREE.Vector3(
    -r * Math.sin(phi) * Math.cos(theta),
    r * Math.cos(phi),
    r * Math.sin(phi) * Math.sin(theta)
  );
}

function drawCountries(countries, nameMap) {
  const landMat = new THREE.MeshPhongMaterial({
    color: 0x0d2a5a,
    emissive: 0x05142a,
    specular: 0x1a4a8a,
    shininess: 20,
    transparent: true,
    opacity: 0.95,
  });

  const highlightMat = new THREE.MeshPhongMaterial({
    color: 0x1a4a9a,
    emissive: 0x0a2a5a,
    specular: 0x4488ff,
    shininess: 40,
    transparent: true,
    opacity: 0.98,
  });

  const selectedMat = new THREE.MeshPhongMaterial({
    color: 0x2a6aff,
    emissive: 0x1a3a8a,
    specular: 0x88aaff,
    shininess: 60,
    transparent: true,
    opacity: 1,
  });

  countries.features.forEach(feature => {
    const name = nameMap[String(feature.id)] || feature.properties?.name || '';
    const meshes = [];
    let centroidLat = 0, centroidLon = 0, count = 0;

    const processRing = (ring) => {
      const pts = [];
      ring.forEach(([lon, lat]) => {
        pts.push(latLonToVec3(lat, lon, RADIUS * 1.001));
        centroidLat += lat; centroidLon += lon; count++;
      });
      if (pts.length < 3) return;
      const geo = new THREE.BufferGeometry().setFromPoints(pts);
      const line = new THREE.Line(geo, new THREE.LineBasicMaterial({
        color: 0x2a6aee, transparent: true, opacity: 0.7, linewidth: 1
      }));
      scene.add(line);
    };

    // Also create filled mesh for raycasting
    const shape3dPoints = [];
    if (feature.geometry.type === 'Polygon') {
      feature.geometry.coordinates.forEach(ring => processRing(ring));
      feature.geometry.coordinates[0].forEach(([lon, lat]) => {
        shape3dPoints.push(latLonToVec3(lat, lon, RADIUS * 1.001));
      });
    } else if (feature.geometry.type === 'MultiPolygon') {
      feature.geometry.coordinates.forEach(polygon => {
        polygon.forEach(ring => processRing(ring));
        if (polygon[0]) {
          polygon[0].forEach(([lon, lat]) => {
            shape3dPoints.push(latLonToVec3(lat, lon, RADIUS * 1.001));
          });
        }
      });
    }

    if (count > 0 && name) {
      const avgLat = centroidLat / count;
      const avgLon = centroidLon / count;
      countryGeoData[name] = { lat: avgLat, lon: avgLon };
    }
  });

  // Create interactive meshes using a simpler approach — subdivided sphere segments per country
  // We'll use a canvas-texture approach for interactivity
  createInteractiveCountries(countries, nameMap);
}

function createInteractiveCountries(countries, nameMap) {
  // For each country, create a slightly raised transparent mesh for click/hover detection
  countries.features.forEach(feature => {
    const name = nameMap[String(feature.id)] || '';
    if (!name) return;

    const rings = [];
    if (feature.geometry.type === 'Polygon') {
      rings.push(...feature.geometry.coordinates);
    } else if (feature.geometry.type === 'MultiPolygon') {
      feature.geometry.coordinates.forEach(p => rings.push(...p));
    }

    const allPts = [];
    rings.forEach(ring => {
      ring.forEach(([lon, lat]) => allPts.push(latLonToVec3(lat, lon, RADIUS * 1.002)));
    });

    if (allPts.length < 3) return;

    // Convex-hull-ish mesh using fan triangulation from centroid
    const cx = allPts.reduce((s, v) => s + v.x, 0) / allPts.length;
    const cy = allPts.reduce((s, v) => s + v.y, 0) / allPts.length;
    const cz = allPts.reduce((s, v) => s + v.z, 0) / allPts.length;
    const len = Math.sqrt(cx*cx+cy*cy+cz*cz);
    const center = new THREE.Vector3(cx/len*RADIUS*1.002, cy/len*RADIUS*1.002, cz/len*RADIUS*1.002);

    const positions = [];
    for (let i = 0; i < allPts.length - 1; i++) {
      positions.push(center.x, center.y, center.z);
      positions.push(allPts[i].x, allPts[i].y, allPts[i].z);
      positions.push(allPts[i+1].x, allPts[i+1].y, allPts[i+1].z);
    }

    const geo = new THREE.BufferGeometry();
    geo.setAttribute('position', new THREE.Float32BufferAttribute(positions, 3));
    geo.computeVertexNormals();

    const mat = new THREE.MeshBasicMaterial({
      color: 0x1a4a8a,
      transparent: true,
      opacity: 0.0,
      side: THREE.DoubleSide,
    });

    const mesh = new THREE.Mesh(geo, mat);
    mesh.userData.countryName = name;
    mesh.userData.isCountry = true;
    scene.add(mesh);
    countryMeshes.push(mesh);
  });
}

function drawBorders(borders) {
  const pts = [];
  borders.coordinates.forEach(line => {
    line.forEach(([lon, lat], i) => {
      if (i > 0) pts.push(latLonToVec3(lat, lon, RADIUS * 1.0015));
      pts.push(latLonToVec3(lat, lon, RADIUS * 1.0015));
    });
  });
  const geo = new THREE.BufferGeometry().setFromPoints(pts);
  const mat = new THREE.LineBasicMaterial({ color: 0x4488ee, transparent: true, opacity: 0.5 });
  scene.add(new THREE.LineSegments(geo, mat));
}

function createOceanLabels() {

    `;
    div.textContent = ocean.name;
    document.body.appendChild(div);
    oceanLabels.push({ div, lat: ocean.lat, lon: ocean.lon });
  });
}

function updateLabels() {
  oceanLabels.forEach(({ div, lat, lon }) => {
    const v = latLonToVec3(lat, lon, RADIUS);
    const projected = v.clone().project(camera);
    // Check if facing camera
    const camDir = camera.position.clone().normalize();
    const dotP = v.clone().normalize().dot(camDir);
    if (dotP < 0.1) { div.style.display = 'none'; return; }
    const x = (projected.x * 0.5 + 0.5) * window.innerWidth;
    const y = (-projected.y * 0.5 + 0.5) * window.innerHeight;
    div.style.display = 'block';
    div.style.left = (x - 40) + 'px';
    div.style.top = (y - 12) + 'px';
    div.style.opacity = Math.min(1, (dotP - 0.1) * 3);
  });
}

// ── Raycasting ──
const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();

function onMouseMove(e) {
  mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
  mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;

  raycaster.setFromCamera(mouse, camera);
  const hits = raycaster.intersectObjects(countryMeshes);

  const tooltip = document.getElementById('tooltip');

  if (hits.length > 0) {
    const name = hits[0].object.userData.countryName;
    renderer.domElement.style.cursor = 'pointer';
    tooltip.textContent = name.toUpperCase();
    tooltip.style.display = 'block';
    tooltip.style.left = (e.clientX + 14) + 'px';
    tooltip.style.top = (e.clientY - 8) + 'px';
    hoveredCountry = name;
  } else {
    renderer.domElement.style.cursor = 'grab';
    tooltip.style.display = 'none';
    hoveredCountry = null;
  }
}

function onClick(e) {
  if (!hoveredCountry) return;
  selectedCountry = hoveredCountry;
  showInfo(selectedCountry);
  flyToCountry(selectedCountry);
}

function flyToCountry(name) {
  const geo = countryGeoData[name];
  if (!geo) return;
  const target = latLonToVec3(geo.lat, geo.lon, 4.0);
  const startPos = camera.position.clone();
  const startTime = Date.now();
  const dur = 800;

  function flyStep() {
    const t = Math.min(1, (Date.now() - startTime) / dur);
    const ease = 1 - Math.pow(1 - t, 3);
    camera.position.lerpVectors(startPos, target, ease);
    controls.update();
    if (t < 1) requestAnimationFrame(flyStep);
  }
  flyStep();
}

function showInfo(name) {
  const data = COUNTRY_DATA[name] || COUNTRY_DATA[Object.keys(COUNTRY_DATA).find(k => k.toLowerCase() === name.toLowerCase())] || null;
  const panel = document.getElementById('info-panel');
  document.getElementById('info-country').textContent = name.toUpperCase();
  document.getElementById('info-capital').textContent = data?.capital || '—';
  document.getElementById('info-area').textContent = data?.area || '—';
  document.getElementById('info-pop').textContent = data?.pop || '—';
  document.getElementById('info-region').textContent = data?.region || '—';
  panel.classList.add('visible');
}

// ── Search ──
function setupSearch() {
  const input = document.getElementById('search-input');
  const results = document.getElementById('search-results');
  const names = Object.keys(COUNTRY_DATA);

  input.addEventListener('input', () => {
    const q = input.value.trim().toLowerCase();
    results.innerHTML = '';
    if (!q) { results.style.display = 'none'; return; }
    const matches = names.filter(n => n.toLowerCase().includes(q)).slice(0, 10);
    if (matches.length === 0) { results.style.display = 'none'; return; }
    matches.forEach(n => {
      const div = document.createElement('div');
      div.className = 'search-item';
      div.textContent = n;
      div.addEventListener('click', () => {
        input.value = n;
        results.style.display = 'none';
        showInfo(n);
        flyToCountry(n);
      });
      results.appendChild(div);
    });
    results.style.display = 'block';
  });

  document.addEventListener('click', e => {
    if (!document.getElementById('search-wrap').contains(e.target)) {
      results.style.display = 'none';
    }
  });
}

function setupEventListeners() {
  renderer.domElement.addEventListener('mousemove', onMouseMove);
  renderer.domElement.addEventListener('click', onClick);
  document.getElementById('info-close').addEventListener('click', () => {
    document.getElementById('info-panel').classList.remove('visible');
  });
  controls.addEventListener('start', () => { controls.autoRotate = false; });
  window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
    drawStars();
  });
}

// ── Animate ──
function animate() {
  requestAnimationFrame(animate);
  controls.update();
  atmosphereMesh.rotation.y += 0.0003;
  updateLabels();
  renderer.render(scene, camera);
}

// ── Boot ──
init().catch(console.error);
</script>
</body>
</html>
