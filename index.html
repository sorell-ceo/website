<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive 3D Globe</title>
    <style>
        body { margin: 0; background-color: #000; overflow: hidden; font-family: sans-serif; }
        #ui-container {
            position: absolute;
            top: 20px;
            left: 20px;
            z-index: 10;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        input {
            padding: 10px;
            border-radius: 5px;
            border: none;
            width: 250px;
            outline: none;
        }
        #info-panel {
            color: white;
            background: rgba(0, 0, 0, 0.7);
            padding: 15px;
            border-radius: 8px;
            border: 1px solid #444;
            display: none;
            max-width: 250px;
        }
        .label { color: #888; font-size: 0.8em; margin-bottom: 2px; }
        .value { color: #fff; font-weight: bold; margin-bottom: 8px; }
        canvas { display: block; }
    </style>
</head>
<body>

    <div id="ui-container">
        <input type="text" id="search" placeholder="Search for a country...">
        <div id="info-panel">
            <div class="label">Country</div>
            <div id="country-name" class="value">-</div>
            <div class="label">Capital</div>
            <div id="country-capital" class="value">-</div>
            <div class="label">Area</div>
            <div id="country-area" class="value">-</div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script src="https://unpkg.com/globe.gl"></script>

    <script>
        const infoPanel = document.getElementById('info-panel');
        const nameEl = document.getElementById('country-name');
        const capitalEl = document.getElementById('country-capital');
        const areaEl = document.getElementById('country-area');

        // Initialize Globe
        const world = Globe()
            (document.body)
            .globeImageUrl('//unpkg.com/three-globe/example/img/earth-blue-marble.jpg') // Base water texture
            .bumpImageUrl('//unpkg.com/three-globe/example/img/earth-topology.png')
            .backgroundColor('#000000')
            .showAtmosphere(true)
            .atmosphereColor('lightskyblue')
            .atmosphereDaylightAlpha(0.1);

        // Load GeoJSON data for countries
        fetch('https://raw.githubusercontent.com/vasturiano/globe.gl/master/example/datasets/ne_110m_admin_0_countries.geojson')
            .then(res => res.json())
            .then(countries => {
                world.polygonsData(countries.features)
                    .polygonCapColor(() => 'rgba(34, 139, 34, 0.7)') // Green land
                    .polygonSideColor(() => 'rgba(0, 100, 0, 0.1)')
                    .polygonStrokeColor(() => '#111')
                    .polygonLabel(({ properties: d }) => `
                        <b>${d.NAME} (${d.ABBREV})</b> <br />
                        Capital: <i>${d.NAME_CIAWF || 'N/A'}</i>
                    `)
                    .onPolygonClick(d => {
                        // Zoom to country
                        world.pointOfView({ lat: d.properties.LABEL_Y, lng: d.properties.LABEL_X, altitude: 2 }, 1000);
                        
                        // Update UI
                        infoPanel.style.display = 'block';
                        nameEl.innerText = d.properties.NAME;
                        capitalEl.innerText = d.properties.NAME_CIAWF || 'N/A';
                        areaEl.innerText = d.properties.POP_EST.toLocaleString() + " (Pop. Est)"; // GeoJSON often lacks area, using population as proxy or label
                    });

                // Search Functionality
                document.getElementById('search').addEventListener('input', (e) => {
