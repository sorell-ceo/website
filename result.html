<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sorell | Your Aura Result</title>
    <link rel="stylesheet" href="result.css">
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700;800&family=Funnel+Display:wght@700;800&display=swap" rel="stylesheet">
</head>
<body>

    <!-- ── GLASSMORPHISM NAV ── -->
    <nav class="glass-nav">
        <div class="nav-logo" onclick="window.location.href='index.html'">Sorell.</div>
        <div class="nav-share" id="share-btn">Share ↗</div>
    </nav>

    <!-- ── MAIN RESULT CARD (9:16 ratio, screenshot-ready) ── -->
    <div id="result-wrapper">

        <div id="result-card">

            <!-- Noise texture overlay -->
            <div class="card-noise"></div>

            <!-- Top section: brand + archetype label -->
            <div class="card-top">
                <span class="brand-tag">SORELL × AURA ID</span>
                <span class="archetype-badge" id="archetype-badge">—</span>
            </div>

            <!-- Center: Big aura score -->
            <div class="card-center">
                <p class="score-label">YOUR AURA SCORE</p>
                <h1 class="aura-score" id="aura-score-display">——</h1>
                <p class="score-sublabel">out of 9,999</p>
            </div>

            <!-- Archetype name — the big identity line -->
            <div class="card-identity">
                <h2 class="archetype-name" id="archetype-name">Loading...</h2>
                <p class="archetype-desc" id="archetype-desc">Calculating your campus DNA...</p>
            </div>

            <!-- Stats bar row -->
            <div class="stat-bars" id="stat-bars">
                <!-- Injected by JS -->
            </div>

            <!-- Bottom: user name + dream city -->
            <div class="card-bottom">
                <div class="user-info">
                    <span class="user-name" id="user-name-display">—</span>
                    <span class="user-meta" id="user-meta-display">—</span>
                </div>
                <div class="sorell-watermark">sorell.in</div>
            </div>

        </div>

        <!-- Screenshot prompt — outside the card so it doesn't appear in share -->
        <p class="screenshot-cta">📸 Screenshot & flex on your story</p>

        <!-- Retake button -->
        <button class="retake-btn" onclick="window.location.href='quiz.html'">
            Retake Vibe Check
        </button>

    </div>

    <script src="result.js"></script>
</body>
</html>
